services:
  backend:
    image: "${PATCHHIVE_SIGNAL_HIVE_BACKEND_IMAGE:-ghcr.io/patchhive/signalhive-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8010:8000"
    volumes:
      - ./data:/data
    environment:
      - SIGNAL_DB_PATH=/data/signal-hive.db
      - SIGNAL_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_SIGNAL_HIVE_FRONTEND_IMAGE:-ghcr.io/patchhive/signalhive-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5174:8080"
    depends_on:
      - backend
    restart: unless-stopped
